
server:
  port: 8080

spring:
  application:
    name: booknote
  
  datasource:
    url: jdbc:h2:mem:booknote;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example.booknote: DEBUG
    org.hibernate.SQL: DEBUG

lucene:
  index-path: ./lucene-index

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
