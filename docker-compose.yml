
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY: "${DOCKER_REGISTRY:-docker.m.daocloud.io}"
        MAVEN_MIRROR_URL: "${MAVEN_MIRROR_URL:-https://maven.aliyun.com/repository/public}"
    container_name: booknote-backend
    ports:
      - "18081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms128m -Xmx256m
    volumes:
      - lucene-data:/app/lucene-index
    networks:
      - booknote-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY: "${DOCKER_REGISTRY:-docker.m.daocloud.io}"
        NPM_REGISTRY: "${NPM_REGISTRY:-https://registry.npmmirror.com}"
    container_name: booknote-frontend
    ports:
      - "18082:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - booknote-network

volumes:
  lucene-data:

networks:
  booknote-network:
    driver: bridge
